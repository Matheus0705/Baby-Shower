<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chá de Bebê - Ines & Sandro</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --invite-bg: #f3f3ee; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Georgia', serif;
        }

        /* ----------------------------------
           CONTAINER (Adaptável e Nítido)
        ------------------------------------- */
        .invite-container {
            position: relative;
            width: 100vw;
            max-width: 400px; /* Limite elegante para telas grandes/PC */
            aspect-ratio: 380 / 530; /* Força a proporção perfeita da sua imagem original */
            background-color: var(--bg-color); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            perspective: 2000px; 
        }

        .invite-container.opened {
            background-color: var(--invite-bg);
        }

        /* ----------------------------------
           ABAS EM 3D (Corte e Alinhamento Perfeitos)
        ------------------------------------- */
        .envelope-gate {
            position: absolute;
            top: 0;
            width: 50.5%; 
            height: 100%;
            background-image: url('convite.png'); 
            background-size: 200% 100%; /* Faz a imagem cobrir as duas abas proporcionalmente */
            background-repeat: no-repeat;
            z-index: 3;
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 2.2s ease;
            backface-visibility: hidden;
        }

        .left-gate {
            left: 0;
            background-position: left center;
            transform-origin: left center;
        }

        .right-gate {
            right: 0;
            background-position: right center;
            transform-origin: right center;
        }

        /* O SELO INVISÍVEL COBRINHO O BOTÃO CENTRAL */
        .wax-seal-trigger {
            position: absolute;
            top: 46%; 
            left: 50%;
            transform: translate(-50%, -50%) translateZ(5px);
            width: 24%; 
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            z-index: 4;
            cursor: pointer;
            background: transparent; 
        }

        /* ----------------------------------
           CARTA INTERNA (Resolução Máxima)
        ------------------------------------- */
        .inner-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--invite-bg); 
            opacity: 0;
            transition: opacity 1s ease; 
            -webkit-overflow-scrolling: touch;
        }

        .inner-letter::-webkit-scrollbar {
            display: none;
        }

        .content-scroller {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-img {
            width: 100%;
            display: block;
            height: auto; /* Garante que a imagem use sua resolução nativa sem achatar */
        }

        /* Container da segunda página */
        .second-page-container {
            position: relative;
            width: 100%;
            opacity: 0.1;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .second-page-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-hint {
            text-align: center;
            font-size: 13px;
            color: #7a6860;
            padding: 15px 0;
            background-color: var(--invite-bg);
            width: 100%;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* ----------------------------------
           ÁREAS CLICÁVEIS MAPEADAS POR PORCENTAGEM
        ------------------------------------- */
        .btn-trigger-confirm {
            position: absolute;
            top: 34%; 
            left: 9%; 
            width: 24%;  
            aspect-ratio: 1 / 1;  
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        .btn-trigger-gifts {
            position: absolute;
            bottom: 2%;
            left: 2%;
            width: 38%;
            height: 24%;
            cursor: pointer;
            z-index: 5;
            background: transparent;
        }

        .btn-trigger-location {
            position: absolute;
            bottom: 11%;  
            right: 10%;
            width: 20%; 
            height: 18%;  
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        /* ----------------------------------
           GATILHOS DE ANIMAÇÃO 3D
        ------------------------------------- */
        .opened .left-gate {
            transform: rotateY(-150deg);
            box-shadow: 20px 0 25px rgba(0,0,0,0.15);
        }

        .opened .right-gate {
            transform: rotateY(150deg);
            box-shadow: -20px 0 25px rgba(0,0,0,0.15);
        }

        .opened .wax-seal-trigger {
            display: none;
        }

        .opened .inner-letter {
            opacity: 1;
            z-index: 2;
        }

        /* Ajuste fino para telas mobile se adaptarem ao tamanho vivificado */
        @media (max-width: 480px) {
            body {
                background-color: var(--invite-bg); /* Integra o fundo das laterais caso sobre espaço */
            }
            .invite-container {
                width: 100vw; /* Ocupa a largura total real do visor do celular */
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="invite-container" id="inviteContainer">
        
        <!-- Clique para abrir sobre o selo original -->
        <div class="wax-seal-trigger" onclick="openInvite()"></div>

        <!-- Capas em 3D sem cortes ou duplicações -->
        <div class="envelope-gate left-gate"></div>
        <div class="envelope-gate right-gate"></div>

        <!-- Conteúdo Interno Nítido -->
        <div class="inner-letter" id="scroller">
            <div class="content-scroller">
                
                <img src="conteudo.png" class="page-img" alt="Mensagem Interna">

                <div class="scroll-hint">▼ Continue lendo abaixo ▼</div>

                <div class="second-page-container" id="secondPage">
                    <img src="botoes.png" class="page-img" alt="Dados e Links">
                    
                    <!-- Link de Confirmação perfeitamente posicionado sobre o círculo do check -->
                    <a href="https://chat.whatsapp.com/IyYlGx2ZJWzEJIdvIb28sk" target="_blank" class="btn-trigger-confirm" title="Entrar no Grupo do WhatsApp"></a>
                    <a href="#" target="_blank" class="btn-trigger-gifts" title="Ver Lista de Presentes"></a>
                    <a href="#" target="_blank" class="btn-trigger-location" title="Ver Localização no Mapa"></a>
                </div>

            </div>
        </div>

    </div>

    <script>
        function openInvite() {
            document.getElementById('inviteContainer').classList.add('opened');
        }

        const scroller = document.getElementById('scroller');
        const secondPage = document.getElementById('secondPage');

        scroller.addEventListener('scroll', () => {
            if (scroller.scrollTop > 20) {
                secondPage.classList.add('visible');
            }
        });
    </script>
</body>
</html>
