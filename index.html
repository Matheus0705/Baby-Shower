<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chá de Bebê - Ines & Sandro</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --invite-bg: #f3f3ee; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Georgia', serif;
            /* Suavização global de fontes e elementos */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ----------------------------------
           CONTAINER
        ------------------------------------- */
        .invite-container {
            position: relative;
            width: 100vw;
            max-width: 380px; 
            aspect-ratio: 380 / 530; 
            background-color: var(--invite-bg); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            perspective: 2000px; 
            /* Ativa aceleração por hardware para suavizar renderização */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ----------------------------------
           ABAS EM 3D (Suaves e Sem Pixels)
        ------------------------------------- */
        .envelope-gate {
            position: absolute;
            top: 0;
            width: 50%; 
            height: 100%;
            overflow: hidden;
            z-index: 3;
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 2.2s ease;
            backface-visibility: hidden;
            background-color: var(--invite-bg);
        }

        .left-gate {
            left: 0;
            transform-origin: left center;
        }

        .right-gate {
            right: 0;
            transform-origin: right center;
        }

        /* Ajustado para suavidade natural de alta definição */
        .gate-img {
            position: absolute;
            top: 0;
            height: 100%;
            width: 200%; 
            display: block;
            object-fit: cover;
            /* Remove o modo pixelado e usa a suavização inteligente nativa do celular */
            image-rendering: auto; 
            transform: translateZ(0); 
        }

        .left-gate .gate-img {
            left: 0;
        }

        .right-gate .gate-img {
            right: 0;
        }

        /* O SELO INVISÍVEL CENTRAL */
        .wax-seal-trigger {
            position: absolute;
            top: 46%; 
            left: 50%;
            transform: translate(-50%, -50%) translateZ(10px);
            width: 25%; 
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            z-index: 4;
            cursor: pointer;
            background: transparent; 
        }

        /* ----------------------------------
           CARTA INTERNA (Suave e Legível)
        ------------------------------------- */
        .inner-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--invite-bg); 
            opacity: 0;
            transition: opacity 0.8s ease; 
            -webkit-overflow-scrolling: touch;
        }

        .inner-letter::-webkit-scrollbar {
            display: none;
        }

        .content-scroller {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Imagens internas também suavizadas com qualidade padrão ouro */
        .page-img {
            width: 100%;
            display: block;
            height: auto;
            image-rendering: auto;
            transform: translateZ(0);
        }

        .second-page-container {
            position: relative;
            width: 100%;
            opacity: 0.1;
            transform: translateY(20px) translateZ(0);
            transition: all 0.8s ease-out;
        }

        .second-page-container.visible {
            opacity: 1;
            transform: translateY(0) translateZ(0);
        }

        .scroll-hint {
            text-align: center;
            font-size: 13px;
            color: #7a6860;
            padding: 15px 0;
            background-color: var(--invite-bg);
            width: 100%;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* ----------------------------------
           BOTÕES MAPEADOS
        ------------------------------------- */
        .btn-trigger-confirm {
            position: absolute;
            top: 34%; 
            left: 9%; 
            width: 24%;  
            aspect-ratio: 1 / 1;  
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        .btn-trigger-gifts {
            position: absolute;
            bottom: 2%;
            left: 2%;
            width: 38%;
            height: 24%;
            cursor: pointer;
            z-index: 5;
            background: transparent;
        }

        .btn-trigger-location {
            position: absolute;
            bottom: 11%;  
            right: 10%;
            width: 20%; 
            height: 18%;  
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        /* ANIMAÇÕES 3D */
        .opened .left-gate {
            transform: rotateY(-155deg);
            box-shadow: 15px 0 20px rgba(0,0,0,0.15);
        }

        .opened .right-gate {
            transform: rotateY(155deg);
            box-shadow: -15px 0 20px rgba(0,0,0,0.15);
        }

        .opened .wax-seal-trigger {
            display: none;
        }

        .opened .inner-letter {
            opacity: 1;
            z-index: 2;
        }

        @media (max-width: 480px) {
            body {
                background-color: var(--invite-bg); 
            }
            .invite-container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="invite-container" id="inviteContainer">
        
        <div class="wax-seal-trigger" onclick="openInvite()"></div>

        <!-- Porta Esquerda -->
        <div class="envelope-gate left-gate">
            <img src="convite.png" class="gate-img" alt="">
        </div>

        <!-- Porta Direita -->
        <div class="envelope-gate right-gate">
            <img src="convite.png" class="gate-img" alt="">
        </div>

        <!-- Conteúdo Interno Suave e Legível -->
        <div class="inner-letter" id="scroller">
            <div class="content-scroller">
                
                <img src="conteudo.png" class="page-img" alt="Mensagem Interna">

                <div class="scroll-hint">▼ Continue lendo abaixo ▼</div>

                <div class="second-page-container" id="secondPage">
                    <img src="botoes.png" class="page-img" alt="Dados e Links">
                    
                    <a href="https://chat.whatsapp.com/IyYlGx2ZJWzEJIdvIb28sk" target="_blank" class="btn-trigger-confirm" title="Entrar no Grupo do WhatsApp"></a>
                    <a href="#" target="_blank" class="btn-trigger-gifts" title="Ver Lista de Presentes"></a>
                    <a href="https://maps.app.goo.gl/4NcG5FyR4QeBBjBUA" target="_blank" class="btn-trigger-location" title="Ver Localização no Mapa"></a>
                </div>

            </div>
        </div>

    </div>

    <script>
        function openInvite() {
            document.getElementById('inviteContainer').classList.add('opened');
        }

        const scroller = document.getElementById('scroller');
        const secondPage = document.getElementById('secondPage');

        scroller.addEventListener('scroll', () => {
            if (scroller.scrollTop > 20) {
                secondPage.classList.add('visible');
            }
        });
    </script>
</body>
</html>
