<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chá de Bebê - Ines & Sandro</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --invite-bg: #f3f3ee; /* Cor de fundo das imagens */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* ----------------------------------
           CONTAINER INTELIGENTE (HÍBRIDO)
        ------------------------------------- */
        .invite-container {
            position: relative;
            width: 380px;  /* Tamanho padrão seguro para PC */
            height: 530px; /* Tamanho padrão seguro para PC */
            background-color: var(--invite-bg); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            perspective: 1500px; /* Efeito 3D isolado aqui dentro */
        }

        /* ----------------------------------
           ABAS EM 3D (Capa do Convite)
        ------------------------------------- */
        .envelope-gate {
            position: absolute;
            top: 0;
            width: 50.6%; 
            height: 100%;
            background-image: url('convite.png'); 
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 3;
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.1, 1), box-shadow 2.5s ease;
            backface-visibility: hidden;
        }

        .left-gate {
            left: 0;
            background-position: left center;
            transform-origin: left center;
        }

        .right-gate {
            right: 0;
            background-position: right center;
            transform-origin: right center;
        }

        /* O SELO INVISÍVEL (Centralizado sobre a emenda) */
        .wax-seal-trigger {
            position: absolute;
            top: 46%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; 
            height: 100px;
            border-radius: 50%;
            z-index: 4;
            cursor: pointer;
            background: transparent; 
        }

        /* ----------------------------------
           CARTA INTERNA (Com Rolagem)
        ------------------------------------- */
        .inner-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--invite-bg); 
            opacity: 0;
            transition: opacity 1.5s ease; 
            -webkit-overflow-scrolling: touch;
        }

        /* Esconde a barra de rolagem para o design ficar limpo */
        .inner-letter::-webkit-scrollbar {
            display: none;
        }

        .content-scroller {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-img {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Container da imagem botoes.png */
        .second-page-container {
            position: relative;
            width: 100%;
            opacity: 0.1;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }

        .second-page-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-hint {
            text-align: center;
            font-size: 13px;
            color: #7a6860;
            padding: 15px 0;
            background-color: var(--invite-bg);
            width: 100%;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* ----------------------------------
           ÁREAS CLICÁVEIS AJUSTADAS
        ------------------------------------- */
        
        /* 1. Ícone do Check (Confirme sua presença) */
        .btn-trigger-confirm {
            position: absolute;
            top: 35%; 
            left: 10%; 
            width: 22%;  
            height: 22%;  
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        /* 2. Carrinho de Bebê (Lista de Presentes) */
        .btn-trigger-gifts {
            position: absolute;
            bottom: 2%;
            left: 2%;
            width: 38%;
            height: 22%;
            cursor: pointer;
            z-index: 5;
            background: transparent;
        }

        /* 3. Pin de Localização (Canto inferior direito) */
        .btn-trigger-location {
            position: absolute;
            bottom: 11%;  
            right: 10%;
            width: 20%; 
            height: 18%;  
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        /* ----------------------------------
           GATILHOS DE ANIMAÇÃO 3D
        ------------------------------------- */
        .opened .left-gate {
            transform: rotateY(-145deg);
            box-shadow: 25px 0 30px rgba(0,0,0,0.2);
        }

        .opened .right-gate {
            transform: rotateY(145deg);
            box-shadow: -25px 0 30px rgba(0,0,0,0.2);
        }

        .opened .wax-seal-trigger {
            display: none;
        }

        .opened .inner-letter {
            opacity: 1;
            z-index: 2;
        }

        /* ----------------------------------
           A MÁGICA DO MOBILE (TELA CHEIA REAL)
        ------------------------------------- */
        @media (max-width: 480px) {
            body {
                background-color: var(--invite-bg); /* Remove o fundo verde escuro no celular */
            }
            .invite-container {
                width: 100vw;
                height: 100vh;
                max-width: 100vw;
                max-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="invite-container" id="inviteContainer">
        
        <!-- Área de clique sobre o selo -->
        <div class="wax-seal-trigger" onclick="openInvite()"></div>

        <!-- Capas em 3D -->
        <div class="envelope-gate left-gate"></div>
        <div class="envelope-gate right-gate"></div>

        <!-- Conteúdo Interno -->
        <div class="inner-letter" id="scroller">
            <div class="content-scroller">
                
                <!-- Primeira Imagem (conteudo.png) -->
                <img src="conteudo.png" class="page-img" alt="Mensagem Interna">

                <div class="scroll-hint">▼ Continue lendo abaixo ▼</div>

                <!-- Segunda Imagem (botoes.png) -->
                <div class="second-page-container" id="secondPage">
                    <img src="botoes.png" class="page-img" alt="Dados e Links">
                    
                    <!-- LINK DO GRUPO DO WHATSAPP -->
                    <a href="https://chat.whatsapp.com/IyYlGx2ZJWzEJIdvIb28sk" target="_blank" class="btn-trigger-confirm" title="Entrar no Grupo do WhatsApp"></a>
                    
                    <!-- LINK DA LISTA DE PRESENTES -->
                    <a href="#" target="_blank" class="btn-trigger-gifts" title="Ver Lista de Presentes"></a>
                    
                    <!-- LINK DE LOCALIZAÇÃO -->
                    <a href="#" target="_blank" class="btn-trigger-location" title="Ver Localização no Mapa"></a>
                </div>

            </div>
        </div>

    </div>

    <script>
        function openInvite() {
            document.getElementById('inviteContainer').classList.add('opened');
        }

        const scroller = document.getElementById('scroller');
        const secondPage = document.getElementById('secondPage');

        scroller.addEventListener('scroll', () => {
            if (scroller.scrollTop > 30) {
                secondPage.classList.add('visible');
            }
        });
    </script>
</body>
</html>
