<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chá de Bebê - Ines & Sandro</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --invite-bg: #f3f3ee; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* ----------------------------------
           CONTAINER (Tamanho padrão PC)
        ------------------------------------- */
        .invite-container {
            position: relative;
            width: 380px;  
            height: 530px; 
            background-color: var(--bg-color); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            perspective: 1500px; 
        }

        .invite-container.opened {
            background-color: var(--invite-bg);
        }

        /* ----------------------------------
           ABAS EM 3D (Ajustadas para Celular e PC)
        ------------------------------------- */
        .envelope-gate {
            position: absolute;
            top: 0;
            width: 50.6%; 
            height: 100%;
            background-image: url('convite.png'); 
            background-size: 380px 530px; /* Mantém a proporção exata no PC */
            background-repeat: no-repeat;
            z-index: 3;
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.1, 1), box-shadow 2.5s ease;
            backface-visibility: hidden;
        }

        .left-gate {
            left: 0;
            background-position: left top;
            transform-origin: left center;
        }

        .right-gate {
            right: 0;
            background-position: right top;
            transform-origin: right center;
        }

        /* O SELO INVISÍVEL */
        .wax-seal-trigger {
            position: absolute;
            top: 46%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; 
            height: 100px;
            border-radius: 50%;
            z-index: 4;
            cursor: pointer;
            background: transparent; 
        }

        /* ----------------------------------
           CARTA INTERNA
        ------------------------------------- */
        .inner-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--invite-bg); 
            opacity: 0;
            transition: opacity 1.5s ease; 
            -webkit-overflow-scrolling: touch;
        }

        .inner-letter::-webkit-scrollbar {
            display: none;
        }

        .content-scroller {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-img {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Container da imagem botoes.png */
        .second-page-container {
            position: relative;
            width: 100%;
            opacity: 0.1;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }

        .second-page-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-hint {
            text-align: center;
            font-size: 13px;
            color: #7a6860;
            padding: 15px 0;
            background-color: var(--invite-bg);
            width: 100%;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* ----------------------------------
           ÁREAS CLICÁVEIS PRECISAS
        ------------------------------------- */
        .btn-trigger-confirm {
            position: absolute;
            top: 35%; 
            left: 10%; 
            width: 85px;  
            height: 85px;  
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        .btn-trigger-gifts {
            position: absolute;
            bottom: 2%;
            left: 2%;
            width: 145px;
            height: 125px;
            cursor: pointer;
            z-index: 5;
            background: transparent;
        }

        .btn-trigger-location {
            position: absolute;
            bottom: 11%;  
            right: 10%;
            width: 75px; 
            height: 95px;  
            cursor: pointer;
            z-index: 5;
            background: transparent; 
        }

        /* ----------------------------------
           GATILHO DE ANIMAÇÃO 3D
        ------------------------------------- */
        .opened .left-gate {
            transform: rotateY(-145deg);
            box-shadow: 25px 0 30px rgba(0,0,0,0.2);
        }

        .opened .right-gate {
            transform: rotateY(145deg);
            box-shadow: -25px 0 30px rgba(0,0,0,0.2);
        }

        .opened .wax-seal-trigger {
            display: none;
        }

        .opened .inner-letter {
            opacity: 1;
            z-index: 2;
        }

        /* ----------------------------------
           ADAPTAÇÃO ADICIONAL PARA CELULAR (MOBILE)
        ------------------------------------- */
        @media (max-width: 480px) {
            .invite-container {
                width: 92vw;
                height: calc(92vw * 1.394); 
                max-width: 380px;
                max-height: 530px;
                border-radius: 4px;
                box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            }
            
            /* Força o tamanho total do container na imagem das abas */
            .envelope-gate {
                background-size: calc(92vw) calc(92vw * 1.394);
            }
            /* Garante que o lado direito puxe o recuo correto baseado na largura dinâmica */
            .right-gate {
                background-position: calc(-92vw / 2) top;
            }

            /* Ajustes de botões proporcionais em telas pequenas */
            .btn-trigger-confirm { width: 22vw; height: 22vw; max-width: 85px; max-height: 85px; }
            .btn-trigger-gifts { width: 38vw; height: 32vw; max-width: 145px; max-height: 125px; }
            .btn-trigger-location { width: 20vw; height: 25vw; max-width: 75px; max-height: 95px; }
        }
    </style>
</head>
<body>

    <div class="invite-container" id="inviteContainer">
        
        <div class="wax-seal-trigger" onclick="openInvite()"></div>

        <!-- Capas em 3D Corrigidas -->
        <div class="envelope-gate left-gate"></div>
        <div class="envelope-gate right-gate"></div>

        <!-- Conteúdo Interno Seguro -->
        <div class="inner-letter" id="scroller">
            <div class="content-scroller">
                
                <img src="conteudo.png" class="page-img" alt="Mensagem Interna">

                <div class="scroll-hint">▼ Continue lendo abaixo ▼</div>

                <div class="second-page-container" id="secondPage">
                    <img src="botoes.png" class="page-img" alt="Dados e Links">
                    
                    <a href="https://chat.whatsapp.com/IyYlGx2ZJWzEJIdvIb28sk" target="_blank" class="btn-trigger-confirm" title="Entrar no Grupo do WhatsApp"></a>
                    <a href="#" target="_blank" class="btn-trigger-gifts" title="Ver Lista de Presentes"></a>
                    <a href="#" target="_blank" class="btn-trigger-location" title="Ver Localização no Mapa"></a>
                </div>

            </div>
        </div>

    </div>

    <script>
        function openInvite() {
            document.getElementById('inviteContainer').classList.add('opened');
        }

        const scroller = document.getElementById('scroller');
        const secondPage = document.getElementById('secondPage');

        scroller.addEventListener('scroll', () => {
            if (scroller.scrollTop > 30) {
                secondPage.classList.add('visible');
            }
        });
    </script>
</body>
</html>
