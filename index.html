<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Bebê - Ines & Sandro</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --letter-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px; 
        }

        /* Container Principal */
        .invite-container {
            position: relative;
            width: 380px;
            height: 530px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            background-color: var(--bg-color); 
            border-radius: 8px;
            transform-style: preserve-3d; 
            transition: background-color 0.5s ease;
        }

        .invite-container.opened {
            background-color: var(--letter-bg);
        }

        /* ----------------------------------
           ABAS EM 3D (Capa do Convite)
        ------------------------------------- */
        .envelope-gate {
            position: absolute;
            top: 0;
            width: 50.5%; 
            height: 100%;
            background-image: url('convite.png'); 
            background-size: 380px 530px;
            background-repeat: no-repeat;
            z-index: 3;
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.1, 1), box-shadow 2.5s ease;
            backface-visibility: hidden;
        }

        .left-gate {
            left: 0;
            background-position: left top;
            transform-origin: left center;
        }

        .right-gate {
            right: 0;
            background-position: right top;
            transform-origin: right center;
        }

        /* O SELO INVISÍVEL */
        .wax-seal-trigger {
            position: absolute;
            top: 46%; 
            left: 50%;
            transform: translate(-50%, -50%) translateZ(10px);
            width: 120px; 
            height: 120px;
            border-radius: 50%;
            z-index: 4;
            cursor: pointer;
            background: transparent; 
        }

        /* ----------------------------------
           CARTA INTERNA (Imagens seguidas)
        ------------------------------------- */
        .inner-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: #f4f5f2; /* Cor aproximada do fundo do seu convite */
            opacity: 0;
            transition: opacity 1.5s ease; 
        }

        /* Estilização da barra de rolagem */
        .inner-letter::-webkit-scrollbar {
            width: 4px;
        }
        .inner-letter::-webkit-scrollbar-thumb {
            background-color: #a3ccc0;
            border-radius: 10px;
        }

        /* Estrutura das Imagens de Conteúdo */
        .content-scroller {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-img {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Container da segunda imagem que guarda os botões clicáveis */
        .second-page-container {
            position: relative;
            width: 100%;
            /* Efeito de surgimento gradual da segunda imagem */
            opacity: 0.3;
            transform: translateY(40px);
            transition: all 1.2s ease-out;
        }

        /* Classe ativada por rolagem para revelar a segunda imagem de forma linda */
        .second-page-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Indicação sutil para rolar para baixo */
        .scroll-hint {
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 13px;
            color: #7a6860;
            padding: 15px 0;
            background-color: #f4f5f2;
            width: 100%;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* ----------------------------------
           ÁREAS CLICÁVEIS SOBRE A SEGUNDA FOTO
        ------------------------------------- */
        
        /* Botão Confirmar Presença Invisível */
        .btn-trigger-confirm {
            position: absolute;
            bottom: 22%; /* Ajuste essa porcentagem baseado em onde está o ícone na sua foto */
            left: 50%;
            transform: translateX(-50%);
            width: 200px; /* Largura da área do botão na foto */
            height: 45px;  /* Altura da área do botão na foto */
            background: transparent; /* Invisível */
            cursor: pointer;
            z-index: 5;
        }

        /* Botão Localização Invisível */
        .btn-trigger-location {
            position: absolute;
            bottom: 8%;  /* Ajuste essa porcentagem baseado em onde está o ícone na sua foto */
            left: 50%;
            transform: translateX(-50%);
            width: 200px; 
            height: 45px;  
            background: transparent; 
            cursor: pointer;
            z-index: 5;
        }

        /* ----------------------------------
           GATILHO DE ANIMAÇÃO 3D
        ------------------------------------- */
        .opened .left-gate {
            transform: rotateY(-145deg);
            box-shadow: 25px 0 30px rgba(0,0,0,0.3);
        }

        .opened .right-gate {
            transform: rotateY(145deg);
            box-shadow: -25px 0 30px rgba(0,0,0,0.3);
        }

        .opened .wax-seal-trigger {
            display: none;
        }

        .opened .inner-letter {
            opacity: 1;
            z-index: 2;
        }

        /* Ajustes Mobile */
        @media (max-width: 400px) {
            .invite-container {
                width: 320px;
                height: 450px;
            }
            .envelope-gate {
                background-size: 320px 450px;
            }
        }
    </style>
</head>
<body>

    <div class="invite-container" id="inviteContainer">
        
        <!-- Área de clique sobre o selo -->
        <div class="wax-seal-trigger" onclick="openInvite()"></div>

        <!-- Capas em 3D -->
        <div class="envelope-gate left-gate"></div>
        <div class="envelope-gate right-gate"></div>

        <!-- Conteúdo Interno com Rolagem de Imagens -->
        <div class="inner-letter" id="scroller">
            <div class="content-scroller">
                
                <!-- Primeira Imagem (conteudo.png) -->
                <img src="conteudo.png" class="page-img" alt="Mensagem Interna">

                <!-- Texto sutil avisando para continuar rolando -->
                <div class="scroll-hint">▼ Continue lendo abaixo ▼</div>

                <!-- Segunda Imagem (botoes.png) encapsulada com os links invisíveis -->
                <div class="second-page-container" id="secondPage">
                    <img src="botoes.png" class="page-img" alt="Dados e Links">
                    
                    <!-- LINKS INVISÍVEIS: Ficam posicionados exatamente sobre os desenhos da foto -->
                    <a href="https://wa.me/seu-numero" target="_blank" class="btn-trigger-confirm" title="Confirmar Presença"></a>
                    <a href="https://maps.google.com/..." target="_blank" class="btn-trigger-location" title="Ver Localização"></a>
                </div>

            </div>
        </div>

    </div>

    <script>
        function openInvite() {
            document.getElementById('inviteContainer').classList.add('opened');
        }

        // Monitora o scroll interno para fazer a segunda imagem surgir com efeito suave
        const scroller = document.getElementById('scroller');
        const secondPage = document.getElementById('secondPage');

        scroller.addEventListener('scroll', () => {
            // Se o usuário descer 60px na leitura, ativa o efeito fluido na segunda imagem
            if (scroller.scrollTop > 60) {
                secondPage.classList.add('visible');
            }
        });
    </script>
</body>
</html>
